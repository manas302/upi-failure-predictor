services:
  redis:
    image: redis:7-alpine
    container_name: redis-upi
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: upi-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - MODEL_PATH=/app/models/xgb_model.pkl
      - FEATURES_PATH=/app/models/feature_names.pkl
    depends_on:
      - redis
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: upi-dashboard
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped